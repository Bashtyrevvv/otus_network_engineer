!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname SW4
!
no aaa new-model
!
vlan 10
 name CLIENTS
!
vlan 20
 name CLIENTS_2
!
vlan 999
 name MGMT
!
interface Ethernet0/0
 description to_SW2
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
!
interface Ethernet0/1
 description to_SW3
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
!
interface Ethernet1/0
 description to_R12
 no switchport
 ip address 10.10.0.26 255.255.255.252
!
interface Ethernet1/1
 description to_R13
 no switchport
 ip address 10.10.0.38 255.255.255.252
!
interface Vlan999
 description MGMT_VLAN
 ip address 10.10.3.225 255.255.255.240
!
interface Loopback0
 description Loopback_SW4
 ip address 10.10.255.248 255.255.255.255
!
spanning-tree mode rapid-pvst
spanning-tree vlan 10 root primary
spanning-tree vlan 20 root primary
spanning-tree vlan 999 root primary
!
interface Ethernet1/0
 spanning-tree portfast trunk
!
interface Ethernet1/1
 spanning-tree portfast trunk
!
router ospf 1
 router-id 10.10.255.248
 network 10.10.0.24 0.0.0.3 area 0
 network 10.10.0.36 0.0.0.3 area 0
 network 10.10.3.224 0.0.0.15 area 0
 network 10.10.255.248 0.0.0.0 area 0
!
line con 0
 password cisco
 logging synchronous
 login
!
line vty 0 4
 password cisco
 logging synchronous
 login
!
end
