!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname R12
!
no aaa new-model
!
interface Ethernet0/0
 description to_SW4
 ip address 10.10.0.25 255.255.255.252
 no shutdown
!
interface Ethernet0/1
 description to_SW5
 ip address 10.10.0.29 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description to_R14
 ip address 10.10.0.1 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description to_R15
 ip address 10.10.0.17 255.255.255.252
 no shutdown
!
interface Loopback0
 description Loopback_R12
 ip address 10.10.255.251 255.255.255.255
!
router ospf 1
 router-id 10.10.255.251
 network 10.10.0.0 0.0.0.3 area 0
 network 10.10.0.16 0.0.0.3 area 0
 network 10.10.0.24 0.0.0.3 area 0
 network 10.10.0.28 0.0.0.3 area 0
 network 10.10.255.251 0.0.0.0 area 0
!
router bgp 1001
 bgp router-id 10.10.255.251
 network 10.10.0.0 mask 255.255.0.0
 neighbor 10.10.0.2 remote-as 1001
 neighbor 10.10.0.18 remote-as 1001
!
line con 0
 password cisco
 logging synchronous
 login
!
line vty 0 4
 password cisco
 logging synchronous
 login
!
end
