!
hostname SW10
!
vlan 30
 name CLIENTS
!
vlan 999
 name MGMT
!
interface Ethernet0/0
 description ===[ Link: e0/0 to VPC8 ]===
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface Ethernet0/1
 description ===[ Link: e0/1 to VPC0 ]===
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface Ethernet0/3
 description ===[ Link: SW10 to R16 ]===
 no switchport
 ip address 10.78.0.9 255.255.255.252
 no shutdown
!
interface Ethernet1/0
 description ===[ Link: SW10 to R17 ]===
 no switchport
 ip address 10.78.0.17 255.255.255.252
 no shutdown
!
interface Vlan999
 description ===[ VLAN: Remote control ]===
 ip address 10.78.0.249 255.255.255.255
 no shutdown
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.78.0.249 255.255.255.255
!
ip default-gateway 10.78.0.249
!
spanning-tree mode rapid-pvst
spanning-tree vlan 30 root secondary
!
router ospf 1
 router-id 10.78.0.249
 network 10.78.0.8 0.0.0.3 area 0
 network 10.78.0.16 0.0.0.3 area 0
 network 10.78.0.249 0.0.0.0 area 0
!
line con 0
 password cisco
 logging synchronous
 login
!
line vty 0 4
 password cisco
 logging synchronous
 login
!
end
