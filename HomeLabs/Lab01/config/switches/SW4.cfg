!
hostname SW4
!
vlan 10
 name CLIENTS
!
vlan 20
 name WORKSTATION
!
vlan 999
 name MGMT
!
interface Ethernet0/0
 description ===[ Link: e0/0 to SW2 ]===
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface Ethernet0/1
 description ===[ Link: e0/1 to SW3 ]===
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface Ethernet1/0
 description ===[ Link: SW4 to R12 ]===
 no switchport
 ip address 10.77.0.26 255.255.255.252
 no shutdown
!
interface Ethernet1/1
 description ===[ Link: SW4 to R13 ]===
 no switchport
 ip address 10.77.0.34 255.255.255.252
 no shutdown
!
interface Vlan999
 description ===[ VLAN: Remote control ]===
 ip address 10.77.0.225 255.255.255.240
 no shutdown
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.77.0.248 255.255.255.255
!
ip default-gateway 10.77.0.225
!
spanning-tree mode rapid-pvst
spanning-tree vlan 10 root primary
spanning-tree vlan 20 root primary
spanning-tree vlan 999 root primary
!
router ospf 1
 router-id 10.77.0.248
 network 10.77.0.24 0.0.0.3 area 0
 network 10.77.0.32 0.0.0.3 area 0
 network 10.77.0.224 0.0.0.15 area 0
 network 10.77.0.248 0.0.0.0 area 0
!
line con 0
 password cisco
 logging synchronous
 login
!
line vty 0 4
 password cisco
 logging synchronous
 login
!
end
