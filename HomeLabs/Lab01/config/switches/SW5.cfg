!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname SW5
!
boot-start-marker
boot-end-marker
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
redundancy
!
vlan 10
 name CLIENTS
!
vlan 20
 name WORKSTATION
!
vlan 999
 name MGMT
!
interface Ethernet0/0
 description ===[ Link: e0/0 to VPC1 ]===
 switchport access vlan 10
 switchport mode access
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface Ethernet0/1
 description ===[ Link: e0/1 to VPC7 ]===
 switchport access vlan 20
 switchport mode access
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface Ethernet0/2
 description ===[ Link: e0/2 to SW2 ]===
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface Ethernet0/3
 description ===[ Link: e0/3 to SW3 ]===
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface Ethernet1/0
 description ===[ Link: SW5 to R13 ]===
 no switchport
 ip address 10.77.0.38 255.255.255.252
 no shutdown
!
interface Ethernet1/1
 description ===[ Link: SW5 to R12 ]===
 no switchport
 ip address 10.77.0.30 255.255.255.252
 no shutdown
!
interface Ethernet1/2
 no ip address
 shutdown
!
interface Ethernet1/3
 no ip address
 shutdown
!
interface Vlan999
 description ===[ VLAN: Remote control ]===
 ip address 10.77.0.226 255.255.255.240
 no shutdown
!
ip default-gateway 10.77.0.225
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.77.0.247 255.255.255.255
!
spanning-tree mode rapid-pvst
spanning-tree vlan 10 root secondary
spanning-tree vlan 20 root secondary
spanning-tree vlan 999 root secondary
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
control-plane
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
end
