!
hostname R18
!
! ========== PKI ==========
crypto pki trustpoint CA
 enrollment url http://10.77.0.253:80
 serial-number none
 subject-name CN=R18, OU=OTUS, O=VPN, C=RU
 revocation-check none
 rsakeypair CA
!
crypto pki certificate chain CA
 certificate 02
!
! ========== ISAKMP ==========
crypto isakmp policy 10
 encr aes 256
 hash sha
 authentication pre-share
 group 14
 lifetime 86400
!
crypto isakmp keepalive 10 3
!
! ========== IPSec Transform-set ==========
crypto ipsec transform-set TRANSFORM-SET esp-aes 256 esp-sha-hmac
 mode tunnel
!
! ========== IPSec Profile ==========
crypto ipsec profile IPSEC-PROF
 set transform-set TRANSFORM-SET
 set pfs group14
!
! ========== GRE Tunnel0 ==========
interface Tunnel0
 description GRE to Moscow
 ip address 172.16.0.2 255.255.255.252
 ip mtu 1400
 ip tcp adjust-mss 1360
 tunnel source Ethernet0/2
 tunnel destination 100.77.0.6
 tunnel path-mtu-discovery
 tunnel protection ipsec profile IPSEC-PROF
!
interface Ethernet0/2
 description to R24 (Triada)
 ip address 100.0.0.10 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description to R26 (Triada)
 ip address 100.0.0.22 255.255.255.252
 no shutdown
!
router eigrp PETER
 address-family ipv4 unicast autonomous-system 1
  network 172.16.0.0 0.0.0.3
!
end
