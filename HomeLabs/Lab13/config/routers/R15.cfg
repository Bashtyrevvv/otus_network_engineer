!
hostname R15
!
! ========== PKI (CA) ==========
crypto pki server CA
 database url flash:
 grant auto
 no shutdown
!
crypto pki trustpoint CA
 enrollment url http://10.77.0.253:80
 ip-address 10.77.0.253
 serial-number none
 subject-name CN=R15, OU=OTUS, O=VPN, C=RU
 revocation-check none
 rsakeypair CA
!
crypto pki certificate chain CA
 certificate 01
!
! ========== ISAKMP ==========
crypto isakmp policy 10
 encr aes 256
 hash sha
 authentication pre-share
 group 14
 lifetime 86400
!
crypto isakmp keepalive 10 3
!
! ========== IPSec Transform-set ==========
crypto ipsec transform-set TRANSFORM-SET esp-aes 256 esp-sha-hmac
 mode tunnel
!
! ========== IPSec Profile ==========
crypto ipsec profile IPSEC-PROF
 set transform-set TRANSFORM-SET
 set pfs group14
!
! ========== GRE Tunnel0 (к R18) ==========
interface Tunnel0
 description GRE to Saint-Petersburg
 ip address 172.16.0.1 255.255.255.252
 ip mtu 1400
 ip tcp adjust-mss 1360
 tunnel source Ethernet0/2
 tunnel destination 100.0.0.10
 tunnel path-mtu-discovery
 tunnel protection ipsec profile IPSEC-PROF
!
! ========== DMVPN Tunnel100 (к R28, R27) ==========
interface Tunnel100
 description DMVPN HUB to Chokurdakh and Labytnangi
 ip address 172.16.1.254 255.255.255.0
 no ip redirects
 ip mtu 1400
 ip nhrp map multicast dynamic
 ip nhrp network-id 100
 ip nhrp registration no-unique
 ip tcp adjust-mss 1360
 ip ospf network broadcast
 ip ospf priority 255
 keepalive 15 3
 tunnel source Ethernet0/2
 tunnel mode gre multipoint
 tunnel path-mtu-discovery
 tunnel protection ipsec profile IPSEC-PROF
!
interface Ethernet0/0
 description to R13
 ip address 10.77.0.17 255.255.255.252
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/1
 description to R12
 ip address 10.77.0.13 255.255.255.252
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/2
 description to R21 (Lamas)
 ip address 100.77.0.6 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description to R20
 ip address 10.77.0.21 255.255.255.252
 ip ospf 1 area 102
 no shutdown
!
router ospf 1
 router-id 10.77.0.253
 network 10.77.0.12 0.0.0.3 area 0
 network 10.77.0.16 0.0.0.3 area 0
 network 10.77.0.20 0.0.0.3 area 102
 network 10.77.0.253 0.0.0.0 area 0
 network 172.16.0.0 0.0.0.3 area 0
 network 172.16.1.0 0.0.0.255 area 0
!
router bgp 1001
 bgp router-id 10.77.0.253
 neighbor 10.77.0.254 remote-as 1001
 neighbor 10.77.0.254 update-source Loopback0
 neighbor 10.77.0.254 next-hop-self
 neighbor 100.77.0.5 remote-as 301
!
end
