!
hostname R18
!
interface Loopback0
 ip address 10.78.0.254 255.255.255.255
!
interface Ethernet0/2
 ip address 100.0.0.10 255.255.255.252
 mpls ip
 no shutdown
!
interface Ethernet0/3
 ip address 100.0.0.22 255.255.255.252
 mpls ip
 no shutdown
!
router ospf 1
 network 10.78.0.254 0.0.0.0 area 0
 network 100.0.0.0 0.0.0.3 area 0
 network 100.0.0.20 0.0.0.3 area 0
!
mpls ldp router-id Loopback0 force
!
router bgp 2042
 neighbor 10.77.0.254 remote-as 1001
 neighbor 10.77.0.254 ebgp-multihop 2
 neighbor 10.77.0.254 update-source Loopback0
 neighbor 10.77.0.253 remote-as 1001
 neighbor 10.77.0.253 ebgp-multihop 2
 neighbor 10.77.0.253 update-source Loopback0
 !
 address-family vpnv4
  neighbor 10.77.0.254 activate
  neighbor 10.77.0.254 send-community extended
  neighbor 10.77.0.253 activate
  neighbor 10.77.0.253 send-community extended
 exit-address-family
!
end
