!
hostname R25
!
interface Ethernet0/0
 description to R23
 ip address 10.0.0.6 255.255.255.252
 no shutdown
!
interface Ethernet0/1
 description to R27
 ip address 100.0.0.17 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description to R26
 ip address 10.0.0.13 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description to R28
 ip address 100.0.0.13 255.255.255.252
 no shutdown
!
interface Loopback0
 description Loopback
 ip address 100.0.0.253 255.255.255.255
!
router bgp 520
 bgp router-id 100.0.0.253
 neighbor 100.0.0.251 remote-as 520
 neighbor 100.0.0.251 update-source Loopback0
 neighbor 100.0.0.252 remote-as 520
 neighbor 100.0.0.252 update-source Loopback0
 neighbor 100.0.0.254 remote-as 520
 neighbor 100.0.0.254 update-source Loopback0
 neighbor 100.0.0.14 remote-as 2042
 neighbor 100.0.0.18 remote-as 2042
 !
 address-family ipv4
  neighbor 100.0.0.251 activate
  neighbor 100.0.0.252 activate
  neighbor 100.0.0.254 activate
  neighbor 100.0.0.14 activate
  neighbor 100.0.0.18 activate
  network 100.0.0.0 mask 255.255.255.0
  network 10.0.0.0 mask 255.255.255.0
 exit-address-family
!
end
