!
hostname R21
!
interface Loopback0
 description Loopback
 ip address 100.77.0.254 255.255.255.255
 ipv6 address 2001:1001:77::254/128
!
interface Ethernet0/0
 description to R15 (Москва)
 ip address 100.77.0.6 255.255.255.252
 ipv6 address 2001:1001:77::6/64
 no shutdown
!
interface Ethernet0/1
 description to R22 (Киторн)
 ip address 100.77.0.1 255.255.255.252
 ipv6 address 2001:1001:77::1/64
 no shutdown
!
interface Ethernet0/2
 description to R24 (Триада)
 ip address 100.0.0.5 255.255.255.252
 ipv6 address 2001:1001:0::5/64
 no shutdown
!
router bgp 101
 bgp router-id 100.77.0.254
 neighbor 100.77.0.5 remote-as 1001
 neighbor 100.77.0.2 remote-as 301
 neighbor 100.0.0.6 remote-as 520
 !
 address-family ipv4
  neighbor 100.77.0.5 activate
  neighbor 100.77.0.2 activate
  neighbor 100.0.0.6 activate
  network 100.77.0.0 mask 255.255.255.0
 exit-address-family
 !
 neighbor 2001:1001:77::5 remote-as 1001
 neighbor 2001:1001:77::2 remote-as 301
 neighbor 2001:1001:0::6 remote-as 520
 !
 address-family ipv6 unicast
  neighbor 2001:1001:77::5 activate
  neighbor 2001:1001:77::2 activate
  neighbor 2001:1001:0::6 activate
  network 2001:1001:77::/48
 exit-address-family
!
end