!
hostname R23
!
interface Loopback0
 description Loopback
 ip address 100.0.0.251 255.255.255.255
 ipv6 address 2001:1001:0::251/128
!
interface Ethernet0/0
 description to R22
 ip address 100.0.0.2 255.255.255.252
 ipv6 address 2001:1001:0::2/64
 no shutdown
!
interface Ethernet0/1
 description to R25
 ip address 10.0.0.5 255.255.255.252
 ipv6 address 2001:1001:0::5/64
 no shutdown
!
interface Ethernet0/2
 description to R24
 ip address 10.0.0.1 255.255.255.252
 ipv6 address 2001:1001:0::1/64
 no shutdown
!
router bgp 520
 bgp router-id 100.0.0.251
 neighbor 100.0.0.252 remote-as 520
 neighbor 100.0.0.253 remote-as 520
 neighbor 100.0.0.254 remote-as 520
 neighbor 100.0.0.1 remote-as 301
 !
 address-family ipv4
  neighbor 100.0.0.252 activate
  neighbor 100.0.0.253 activate
  neighbor 100.0.0.254 activate
  neighbor 100.0.0.1 activate
  neighbor 100.0.0.252 route-reflector-client
  neighbor 100.0.0.253 route-reflector-client
  neighbor 100.0.0.254 route-reflector-client
  network 100.0.0.0 mask 255.255.255.0
  network 10.0.0.0 mask 255.255.255.0
 exit-address-family
 !
 neighbor 2001:1001:0::252 remote-as 520
 neighbor 2001:1001:0::253 remote-as 520
 neighbor 2001:1001:0::254 remote-as 520
 neighbor 2001:1001:0::1 remote-as 301
 !
 address-family ipv6 unicast
  neighbor 2001:1001:0::252 activate
  neighbor 2001:1001:0::253 activate
  neighbor 2001:1001:0::254 activate
  neighbor 2001:1001:0::1 activate
  neighbor 2001:1001:0::252 route-reflector-client
  neighbor 2001:1001:0::253 route-reflector-client
  neighbor 2001:1001:0::254 route-reflector-client
  network 2001:1001:0::/48
 exit-address-family
!
end