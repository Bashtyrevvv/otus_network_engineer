!
hostname R24
!
interface Loopback0
 description Loopback
 ip address 100.0.0.252 255.255.255.255
 ipv6 address 2001:1001:0::252/128
!
interface Ethernet0/0
 description to R21 (Ламас)
 ip address 100.0.0.6 255.255.255.252
 ipv6 address 2001:1001:0::6/64
 no shutdown
!
interface Ethernet0/1
 description to R26
 ip address 10.0.0.9 255.255.255.252
 ipv6 address 2001:1001:0::9/64
 no shutdown
!
interface Ethernet0/2
 description to R23
 ip address 10.0.0.2 255.255.255.252
 ipv6 address 2001:1001:0::2/64
 no shutdown
!
interface Ethernet0/3
 description to R18 (С.-Петербург)
 ip address 100.0.0.10 255.255.255.252
 ipv6 address 2001:1001:0::10/64
 no shutdown
!
router bgp 520
 bgp router-id 100.0.0.252
 neighbor 100.0.0.5 remote-as 101
 neighbor 100.0.0.9 remote-as 2042
 neighbor 100.0.0.251 remote-as 520
 neighbor 100.0.0.253 remote-as 520
 neighbor 100.0.0.254 remote-as 520
 !
 address-family ipv4
  neighbor 100.0.0.5 activate
  neighbor 100.0.0.9 activate
  neighbor 100.0.0.251 activate
  neighbor 100.0.0.253 activate
  neighbor 100.0.0.254 activate
  neighbor 100.0.0.253 route-reflector-client
  neighbor 100.0.0.254 route-reflector-client
  network 100.0.0.0 mask 255.255.255.0
  network 10.0.0.0 mask 255.255.255.0
 exit-address-family
 !
 neighbor 2001:1001:0::5 remote-as 101
 neighbor 2001:1001:0::9 remote-as 2042
 neighbor 2001:1001:0::251 remote-as 520
 neighbor 2001:1001:0::253 remote-as 520
 neighbor 2001:1001:0::254 remote-as 520
 !
 address-family ipv6 unicast
  neighbor 2001:1001:0::5 activate
  neighbor 2001:1001:0::9 activate
  neighbor 2001:1001:0::251 activate
  neighbor 2001:1001:0::253 activate
  neighbor 2001:1001:0::254 activate
  neighbor 2001:1001:0::253 route-reflector-client
  neighbor 2001:1001:0::254 route-reflector-client
  network 2001:1001:0::/48
 exit-address-family
!
end