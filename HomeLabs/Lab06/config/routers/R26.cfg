!
hostname R26
!
interface Ethernet0/0
 description to R24
 ip address 10.0.0.10 255.255.255.252
 no shutdown
!
interface Ethernet0/1
 description to R28
 ip address 100.0.0.25 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description to R25
 ip address 10.0.0.14 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description to R18 (С.-Петербург)
 ip address 100.0.0.22 255.255.255.252
 no shutdown
!
interface Loopback0
 description Loopback
 ip address 100.0.0.254 255.255.255.255
!
router bgp 520
 bgp router-id 100.0.0.254
 neighbor 100.0.0.21 remote-as 2042
 !
 address-family ipv4
  neighbor 100.0.0.21 activate
  network 100.0.0.0 mask 255.255.255.0
  network 10.0.0.0 mask 255.255.255.0
 exit-address-family
!
end
