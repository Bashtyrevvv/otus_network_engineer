!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname R28
!
boot-start-marker
boot-end-marker
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
redundancy
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.67.0.254 255.255.255.255
!
interface Tunnel100
 description ===[ DMVPN Spoke to Moscow ]===
 ip address 172.16.1.1 255.255.255.0
 no ip redirects
 ip mtu 1400
 ip nhrp map 172.16.1.254 100.77.0.6
 ip nhrp map multicast 100.77.0.6
 ip nhrp network-id 100
 ip nhrp nhs 172.16.1.254
 ip nhrp registration no-unique
 ip tcp adjust-mss 1360
 ip ospf network broadcast
 ip ospf priority 0
 keepalive 15 3
 tunnel source Ethernet0/0
 tunnel mode gre multipoint
 tunnel path-mtu-discovery
!
interface Ethernet0/0
 description ===[ Link: R28 to R26 ]===
 ip address 100.0.0.26 255.255.255.252
 no shutdown
!
interface Ethernet0/1
 description ===[ Link: R28 to R25 ]===
 ip address 100.0.0.14 255.255.255.252
 no shutdown
!
interface Ethernet0/2.100
 encapsulation dot1Q 100
 ip address 10.67.1.1 255.255.255.128
!
interface Ethernet0/2.200
 encapsulation dot1Q 200
 ip address 10.67.1.129 255.255.255.128
!
interface Ethernet0/2.999
 encapsulation dot1Q 999
 ip address 10.67.0.1 255.255.255.248
!
router ospf 1
 router-id 10.67.0.254
 network 10.67.0.0 0.0.0.7 area 0
 network 10.67.1.0 0.0.0.127 area 0
 network 10.67.1.128 0.0.0.127 area 0
 network 10.67.0.254 0.0.0.0 area 0
 network 172.16.1.0 0.0.0.255 area 0
!
router bgp 2042
 bgp router-id 10.67.0.254
 network 10.67.0.0 mask 255.255.0.0
 neighbor 100.0.0.13 remote-as 520
 neighbor 100.0.0.25 remote-as 520
!
ip route 0.0.0.0 0.0.0.0 100.0.0.13 25 name "to R25 (ISP)"
ip route 0.0.0.0 0.0.0.0 100.0.0.25 50 name "to R26 (ISP)"
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
end
