!
hostname R21
!
interface Ethernet0/0
 description to R15 (Москва)
 ip address 100.77.0.6 255.255.255.252
 no shutdown
!
interface Ethernet0/1
 description to R22 (Киторн)
 ip address 100.77.0.1 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description to R24 (Триада)
 ip address 100.0.0.5 255.255.255.252
 no shutdown
!
interface Loopback0
 description Loopback
 ip address 100.77.0.254 255.255.255.255
!
ip prefix-list TO-MOSCOW seq 5 permit 0.0.0.0/0
ip prefix-list TO-MOSCOW seq 10 permit 10.78.0.0/16
!
router bgp 101
 bgp router-id 100.77.0.254
 neighbor 100.77.0.5 remote-as 1001
 neighbor 100.77.0.2 remote-as 301
 neighbor 100.0.0.6 remote-as 520
 !
 address-family ipv4
  neighbor 100.77.0.5 activate
  neighbor 100.77.0.2 activate
  neighbor 100.0.0.6 activate
  neighbor 100.77.0.5 prefix-list TO-MOSCOW out
  network 100.77.0.0 mask 255.255.255.0
 exit-address-family
!
end
