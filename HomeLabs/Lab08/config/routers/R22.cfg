!
hostname R22
!
interface Ethernet0/0
 description to R14 (Москва)
 ip address 100.78.0.2 255.255.255.252
 no shutdown
!
interface Ethernet0/1
 description to R21 (Ламас)
 ip address 100.77.0.2 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description to R23 (Триада)
 ip address 100.0.0.1 255.255.255.252
 no shutdown
!
interface Loopback0
 description Loopback
 ip address 100.78.0.254 255.255.255.255
!
ip prefix-list TO-MOSCOW seq 5 permit 0.0.0.0/0
!
router bgp 301
 bgp router-id 100.78.0.254
 neighbor 100.78.0.1 remote-as 1001
 neighbor 100.77.0.1 remote-as 101
 !
 address-family ipv4
  neighbor 100.78.0.1 activate
  neighbor 100.77.0.1 activate
  neighbor 100.78.0.1 prefix-list TO-MOSCOW out
  network 100.78.0.0 mask 255.255.255.0
 exit-address-family
!
end
