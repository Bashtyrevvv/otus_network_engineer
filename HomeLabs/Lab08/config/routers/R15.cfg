!
hostname R15
!
interface Ethernet0/0
 description to R13
 ip address 10.77.0.17 255.255.255.252
 no shutdown
!
interface Ethernet0/1
 description to R12
 ip address 10.77.0.13 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description to R21 (Ламас)
 ip address 100.77.0.5 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description to R20
 ip address 10.77.0.21 255.255.255.252
 no shutdown
!
interface Loopback0
 description Loopback
 ip address 10.77.0.253 255.255.255.255
!
ip as-path access-list 10 deny .*
!
router bgp 1001
 bgp router-id 10.77.0.253
 neighbor 10.77.0.254 remote-as 1001
 neighbor 10.77.0.254 update-source Loopback0
 neighbor 10.77.0.254 next-hop-self
 neighbor 100.77.0.6 remote-as 101
 neighbor 100.78.0.2 remote-as 301
 !
 address-family ipv4
  neighbor 10.77.0.254 activate
  neighbor 100.77.0.6 activate
  neighbor 100.78.0.2 activate
  neighbor 100.77.0.6 filter-list 10 out
  neighbor 100.78.0.2 filter-list 10 out
  network 10.77.0.0 mask 255.255.0.0
 exit-address-family
!
end
